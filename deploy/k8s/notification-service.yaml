apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: commerce-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/arda/distributed-commerce-core:notification-service
          ports:
            - containerPort: 8084
          env:
            - name: APP_NAME
              value: notification-service
            - name: HTTP_ADDR
              value: ":8084"
            - name: POSTGRES_DSN
              value: postgres://app:app@postgres:5432/commerce?sslmode=disable
            - name: NATS_URL
              value: nats://nats:4222
            - name: REDIS_ADDR
              value: redis:6379
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8084
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: commerce-core
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084
