apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: commerce-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator-service
          image: ghcr.io/arda/distributed-commerce-core:orchestrator-service
          ports:
            - containerPort: 8085
          env:
            - name: APP_NAME
              value: orchestrator-service
            - name: HTTP_ADDR
              value: ":8085"
            - name: POSTGRES_DSN
              value: postgres://app:app@postgres:5432/commerce?sslmode=disable
            - name: NATS_URL
              value: nats://nats:4222
            - name: REDIS_ADDR
              value: redis:6379
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8085
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: commerce-core
spec:
  selector:
    app: orchestrator-service
  ports:
    - port: 8085
      targetPort: 8085
