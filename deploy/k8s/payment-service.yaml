apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: commerce-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/arda/distributed-commerce-core:payment-service
          ports:
            - containerPort: 8082
          env:
            - name: APP_NAME
              value: payment-service
            - name: HTTP_ADDR
              value: ":8082"
            - name: POSTGRES_DSN
              value: postgres://app:app@postgres:5432/commerce?sslmode=disable
            - name: NATS_URL
              value: nats://nats:4222
            - name: REDIS_ADDR
              value: redis:6379
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: commerce-core
spec:
  selector:
    app: payment-service
  ports:
    - port: 8082
      targetPort: 8082
