apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: commerce-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/arda/distributed-commerce-core:gateway
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: gateway
            - name: HTTP_ADDR
              value: ":8080"
            - name: POSTGRES_DSN
              value: postgres://app:app@postgres:5432/commerce?sslmode=disable
            - name: NATS_URL
              value: nats://nats:4222
            - name: REDIS_ADDR
              value: redis:6379
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: commerce-core
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
